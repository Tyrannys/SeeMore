name: OptiView
main: com.tyrannys.optiview.SeeMore
version: ${version}
api-version: '1.19'
authors: [froobynooby, Tyrannys]
description: Per-player view distance based on client settings.
folia-supported: true
softdepend: [EssentialsX, Essentials]

commands:
  optiview:
    description: The base command for OptiView.

permissions:
  optiview.command.*:
    description: Access to all OptiView subcommands.
    default: op
    children:
      - optiview.command.optiview
      - optiview.command.reload
      - optiview.command.average
      - optiview.command.players

  optiview.command.optiview:
    description: Access to the /optiview command.
    default: op

  optiview.command.average:
    description: Access to the /optiview average command.
    default: op
    children:
      - optiview.command.optiview

  optiview.command.reload:
    description: Access to the /optiview reload command.
    default: op
    children:
      - optiview.command.optiview

  optiview.command.players:
    description: Access to the /optiview players command.
    default: op
    children:
      - optiview.command.optiview

  optiview.command.afk:
    description: Access to the /optiview afk command.
    default: true
    children:
      - optiview.command.optiview
